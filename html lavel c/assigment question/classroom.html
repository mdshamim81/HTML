<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assigment Question</title>
</head>
<body>
    <table border="black">
        <caption>Student Information</caption>
        <tr>
            <li>
                <th rowspan="6">Info</th>
                <th rowspan="2">Name</th>
                <th colspan="2">Address</th>
            </li>
        </tr>
        <tr>
            <li>
                <th>City</th>
                <th>House</th>
            </li>
        </tr>

        <tr>
            <td>A</td>
            <td>Delhi</td>
            <td>1</td>
        </tr>
        <tr>
            <td>B</td>
            <td>Mumbai</td>
            <td>2</td>
        </tr>
        <tr>
            <td>C</td>
            <td>Kolkata</td>
            <td>3</td>
        </tr>
        <tr>
            <td>D</td>
            <td>Pune</td>
            <td>4</td>
        </tr>
    </table>
    <br><hr>

    <!-- form -->
    <form action="/server">
        <label for="name">Name :</label>
        <input type="text" name="name">
        <br><br>

        <label for="sex">Sex :</label>
        <input type="radio" name="sex" value="male" id="male">
        <label for="male">Male</label>

        <input type="radio" name="sex" value="Female" id="Female">
        <label for="">Female</label>

        <br><br>
        <label for="country">Country :</label>
        <select name="country" id="country">
            <option>Select an option</option>
            <option value="india">India</option>
            <option value="america">America</option>
            <option value="usa">USA</option>
            <option value="pakistan">Pakistan</option>
            <option value="africa">Africa</option>
            <option value="brazil">Brazil</option>
            <option value="arab">Arab</option>
            <option value="kuwait">Kuwait</option>
            <option value="poland">Poland</option>
            
        </select>
        <br><br>
        <label for="Message">Message :</label>
        <br>
        <textarea name="Message" id="Message" cols="30" rows="4"></textarea>
        <br><br>
        <input type="checkbox" id="subcribe" name="subcribe">
        <label for="subcribe">Subcribe ?</label>
        <br><br>
        <button>submit</button>
        <br><br><hr>

        <h3>Feedback Form</h3>

        <label for="sname">Name :</label>
        <input type="text" placeholder="Write your name" name="sname" id="sname">
        <br><br>
        <label for="email">Email :</label>
        <input type="email" placeholder="Write your email" name="email" id="email">
        <br><br><br>
        <label for="Message">Message :</label>
        <br>
        <textarea name="Message" id="Message" rows="4" cols="30"></textarea>

        <br><br>
         <label for="rating">Rate us our of 5 :</label>
         <br>
         <input type="radio" name="rating" id="one"  value="one">
         <label for="one">1</label>
        <br>
         <input type="radio" name="rating" id="two" value="two">
         <label for="two">2</label>
         <br>
         <input type="radio" name="rating" id="three" value="three">
         <label for="three">3</label>
         <br>
         <input type="radio" name="rating" id="four" value="four">
         <label for="four">4</label>
         <br>
         <input type="radio" name="rating" id="five" value="five">
         <label for="five">5</label>

         <br>
         <button>Send your message!</button>

    </form>

</body>
</html>
