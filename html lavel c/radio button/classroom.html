<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>radio buttun</title>
</head>
<body>
    <form action="/server">
        <div>
        
            <input type="radio" name="fruit1" id="apple" value="apple">
            <label for="apple">apple</label>

            <input type="radio" name="fruit2" id="mango" value="mango">
            <label for="mango">mango</label> 

            <input type="radio" name="fruit3" id="banana" value="banana">
            <label for="banana">banana</label>
        </div>

        <br>
        
        <div>
            Choose your subject : 
            <input type="checkbox" name="subject" id="math" value="math">
            <label for="math">Math</label>

            <input type="checkbox" name="subject" id="science" value="science">
            <label for="science">science</label>

            <input type="checkbox" name="subject" id="english" value="english">
            <label for="english">english</label>

            <input type="checkbox" name="subject" id="urdu" value="urdu">
            <label for="urdu">urdu</label>

        </div>
        <button>submit</button>
    </form>
</body>
</html>
