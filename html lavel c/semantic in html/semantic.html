<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic in html</title>
</head>
<body>
    <table>
        <caption>Food Manu</caption>
        <!-- table head -->
        <thead>
            <tr>
                <th>Item</th>
                <th>Price</th>
            </tr>
        </thead>

        <!-- table body -->
        <tbody>
            <tr>
                <td>Samosa</td>
                <td>$10</td>
            </tr>

            <tr>
                <td>Frooti</td>
                <td>$20</td>
            </tr>

            <tr>
                <td>Chips</td>
                <td>$15</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
