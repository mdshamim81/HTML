<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name attribute</title>
</head>
<body>
    <form action="/server">
        <div>
            <label for="password">Username : </label>
            <input type="text" placeholder="enter username" id="user" name="user">
        </div>
        <div>
            <label for="password">Password : </label>
            <input type="password" placeholder="enter password" id="password" name="pass">
        </div>
        <button type="submit">submit</button>
    </form>

    <hr>
    <form action="https://www.youtube.com/results">
        <input type="text" placeholder="search in youtube" name="search_query">
        <button>search</button>
    </form>
</body>
</html>
