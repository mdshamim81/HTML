<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute in html</title>
</head>
<body>
    <ul>
        <li>Frooti</li>
        <li>Samosa</li>
        <li>Dosa</li>
    </ul>


    <ol type="a">
        <li>Bread</li>
        <li>Jam</li>
        <li>Frooti</li>
        <li>Dosa</li>
    </ol>


    <ul>
        <li>Bread</li>
        <ol>
            <li>Brown Bread</li>
            <li>White Bread</li>
        </ol>
    </ul>


    <ul>
        <li>Samosa</li>
        <li>Jam</li>
        <li>Frooti</li>
        <li>Bread</li>
    </ul>
</body>
</html>
