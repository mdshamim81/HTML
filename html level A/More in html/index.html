<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Br tags</title>
</head>
<body>
    <p>Twinkle Twinkle little star how i wonder what you are</p>
    <p>Twinkle Twinkle <br>little star <br> how i wonder <br> what you are</p>
    <br>

    <p><b>Twinkle Twinkle</b> <br><i>little star</i> <br> <u>how i wonder</u> <br> what you are</p>

    <br><br><br>
    <p><b>Twinkle Twinkle</b></p>
    <p><i>little star</i></p>
    <p><u>how i wonder</u></p>
    <p>what you are</p>

</body>
</html>
